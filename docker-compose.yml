services:
  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    networks:
      - mern-network

  frontend:
    build: ./Frontend
    ports:
      - "3000:80"   # React production build served via Nginx
    env_file:
      - ./Frontend/.env
    depends_on:
      - Backend
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge
